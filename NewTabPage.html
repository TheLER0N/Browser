<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KING — Новая вкладка</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  /* BW Monochrome palette — строго из design.md */
  --bg:#000000;--bg-surface:#1a1a1a;--bg-elevated:#222222;--bg-overlay:#2a2a2a;
  --accent:#ffffff;--accent-soft:#e0e0e0;--accent-deep:#cccccc;
  --text:#f0f0f0;--text-secondary:#999999;--text-muted:#666666;--text-disabled:#444444;
  --border:#1a1a1a;--border-strong:#333333;
  --danger:#ff3333;
}
html{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  height:100%;overflow-x:hidden;position:relative;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}

/* ── Ambient Background (White Glow вместо Purple) ── */
.ambient{
  position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
}
.ambient::before,.ambient::after{
  content:'';position:absolute;border-radius:50%;filter:blur(160px);opacity:.04;
}
.ambient::before{
  width:700px;height:700px;top:-20%;left:-15%;
  background:radial-gradient(circle,var(--accent),transparent 70%);
  animation:drift1 14s ease-in-out infinite alternate;
}
.ambient::after{
  width:600px;height:600px;bottom:-15%;right:-10%;
  background:radial-gradient(circle,var(--accent-deep),transparent 70%);
  animation:drift2 16s ease-in-out infinite alternate;
}
@keyframes drift1{0%{transform:translate(0,0) scale(1)}100%{transform:translate(70px,50px) scale(1.15)}}
@keyframes drift2{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-60px,-40px) scale(1.1)}}

/* ── Grid Pattern Overlay ── */
.grid-pattern{
  position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;
  background-image:
    linear-gradient(var(--text-muted) 1px,transparent 1px),
    linear-gradient(90deg,var(--text-muted) 1px,transparent 1px);
  background-size:80px 80px;
}

/* ── Particles — белые вместо фиолетовых ── */
.particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.particle{
  position:absolute;border-radius:50%;
  background:var(--accent);opacity:0;animation:rise linear infinite;
}
@keyframes rise{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  8%{opacity:.15}
  92%{opacity:.15}
  100%{transform:translateY(-8vh) scale(1);opacity:0}
}

/* ── Clock ── */
.clock{
  position:fixed;top:24px;right:32px;z-index:10;
  font-size:22px;font-weight:300;color:var(--text-secondary);
  font-family:'Consolas','Cascadia Code',monospace;
  letter-spacing:1px;
}

/* ── Main Layout ── */
.main{
  position:relative;z-index:5;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;padding:60px 24px 40px;
  overflow-y:auto;
}

/* ── Logo ── */
.logo-wrap{position:relative;margin-bottom:20px;display:flex;align-items:center;justify-content:center}
.logo{
  width:90px;height:90px;object-fit:contain;
  border-radius:16px;
  filter:drop-shadow(0 0 30px rgba(255,255,255,.2));
  animation:float 4.5s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
.ring{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:115px;height:115px;border-radius:50%;
  border:2px solid rgba(255,255,255,.15);
  animation:ring 3.5s ease-in-out infinite;
}
.ring::before{
  content:'';position:absolute;inset:8px;border-radius:50%;
  border:1px solid rgba(255,255,255,.08);
  animation:ring 3.5s ease-in-out infinite reverse;
}
@keyframes ring{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5}
  50%{transform:translate(-50%,-50%) scale(1.15);opacity:.2}
}

/* ── Typography ── */
h1{
  font-size:42px;font-weight:700;margin-bottom:8px;letter-spacing:3px;
  color:var(--text);
  text-transform:uppercase;
  font-family:'Segoe UI',system-ui,sans-serif;
}
h1 span{
  background:linear-gradient(135deg,var(--accent-soft),var(--accent),var(--accent-deep));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.subtitle{
  color:var(--text-secondary);font-size:14px;margin-bottom:12px;
  font-weight:400;letter-spacing:.5px;
}

/* ── Stealth Badge ── */
.stealth{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(102,102,102,.1);border:1px solid rgba(102,102,102,.25);
  border-radius:24px;padding:6px 16px;margin-bottom:40px;
  font-size:11px;color:var(--text-muted);font-weight:600;
  text-transform:uppercase;letter-spacing:1px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.dot{
  width:8px;height:8px;border-radius:50%;background:var(--text-muted);
  animation:blink 2.5s ease-in-out infinite;
}
.dot.active{background:var(--accent);box-shadow:0 0 8px var(--accent)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Search Bar ── */
.search{
  width:100%;max-width:580px;margin-bottom:48px;position:relative;
}
.search input{
  width:100%;padding:15px 52px 15px 22px;
  background:var(--bg-surface);border:1px solid var(--border);
  border-radius:24px;color:var(--text);font-size:14px;
  outline:none;transition:all .3s ease;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  font-family:'Segoe UI',system-ui,sans-serif;
}
.search input::placeholder{color:var(--text-muted)}
.search input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(255,255,255,.1),0 10px 36px rgba(0,0,0,.4);
}
.search input:hover:not(:focus){border-color:var(--border-strong)}
.search .ico{
  position:absolute;right:18px;top:50%;transform:translateY(-50%);
  font-size:17px;opacity:.35;pointer-events:none;color:var(--text-muted);
}

/* ── Quick Links Grid ── */
.grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
  max-width:620px;width:100%;margin-bottom:40px;
}
.card{
  background:rgba(26,26,26,.7);border:1px solid var(--border);
  border-radius:16px;padding:22px 14px;text-align:center;
  cursor:pointer;position:relative;overflow:hidden;
  transition:all .35s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(204,204,204,.03));
  opacity:0;transition:opacity .35s ease;
}
.card:hover::before{opacity:1}
.card:hover{
  transform:translateY(-5px);
  border-color:var(--accent-soft);
  box-shadow:0 12px 40px rgba(255,255,255,.06),0 0 0 1px var(--accent-soft);
}
.card:active{transform:translateY(-2px) scale(.98)}
.card .icon{
  font-size:30px;margin-bottom:10px;position:relative;z-index:1;
  transition:transform .35s ease;
}
.card:hover .icon{transform:scale(1.15) rotate(3deg)}
.card .label{
  font-size:12px;color:var(--text);font-weight:600;
  position:relative;z-index:1;
}

/* ── Chips ── */
.chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.chip{
  padding:9px 18px;background:rgba(26,26,26,.5);
  border:1px solid var(--border);border-radius:20px;
  color:var(--text-secondary);font-size:12px;cursor:pointer;
  transition:all .3s ease;text-decoration:none;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.chip:hover{
  background:rgba(255,255,255,.06);border-color:var(--accent-deep);
  color:var(--text);transform:translateY(-2px);
  box-shadow:0 5px 18px rgba(255,255,255,.04);
}

/* ── Footer ── */
.footer{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  color:var(--text-muted);font-size:10px;letter-spacing:.3px;
  display:flex;gap:16px;align-items:center;
}
.footer kbd{
  background:var(--bg-elevated);border:1px solid var(--border);
  border-radius:5px;padding:2px 6px;font-size:9.5px;font-family:inherit;
  color:var(--text-secondary);
}

/* ── Entrance Animations ── */
.main>*{animation:fadeUp .7s ease-out both}
.main>*:nth-child(1){animation-delay:.1s}
.main>*:nth-child(2){animation-delay:.2s}
.main>*:nth-child(3){animation-delay:.3s}
.main>*:nth-child(4){animation-delay:.4s}
.main>*:nth-child(5){animation-delay:.5s}
.main>*:nth-child(6){animation-delay:.6s}
.main>*:nth-child(7){animation-delay:.7s}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Responsive ── */
@media(max-width:700px){
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  h1{font-size:32px;letter-spacing:2px}
  .logo{width:70px;height:70px}
  .clock{font-size:16px;top:14px;right:14px}
  .search{max-width:100%}
  .footer{gap:8px;font-size:9px}
}
</style>
</head>
<body>

<div class="ambient"></div>
<div class="grid-pattern"></div>
<div class="particles" id="p"></div>
<div class="clock" id="clk"></div>

<div class="main">
  <div class="logo-wrap">
    <div class="ring"></div>
    <img class="logo" src="KING11.png" alt="KING"/>
  </div>

  <h1><span>KING</span></h1>
  <p class="subtitle">Приватный браузер нового поколения</p>

  <div class="stealth" id="sb">
    <span class="dot" id="sd"></span>
    <span id="st">Stealth OFF</span>
  </div>

  <div class="search">
    <input type="text" id="si" placeholder="Поиск или введите URL..."
           onkeydown="if(event.key==='Enter'){var v=this.value;if(v){location.href=v.startsWith('http')?v:'https://www.google.com/search?q='+encodeURIComponent(v)}}"/>
    <span class="ico">⌕</span>
  </div>

  <div class="grid">
    <div class="card" onclick="location.href='https://theler0n.github.io/Sait/'">
      <div class="icon">♚</div><div class="label">Мой сайт</div>
    </div>
    <div class="card" onclick="location.href='https://www.google.com'">
      <div class="icon">⊙</div><div class="label">Google</div>
    </div>
    <div class="card" onclick="location.href='https://www.youtube.com'">
      <div class="icon">▷</div><div class="label">YouTube</div>
    </div>
    <div class="card" onclick="location.href='https://github.com'">
      <div class="icon">⌘</div><div class="label">GitHub</div>
    </div>
    <div class="card" onclick="location.href='https://vk.com'">
      <div class="icon">◈</div><div class="label">VK</div>
    </div>
    <div class="card" onclick="location.href='https://web.telegram.org'">
      <div class="icon">◉</div><div class="label">Telegram</div>
    </div>
    <div class="card" onclick="location.href='https://discord.com'">
      <div class="icon">◇</div><div class="label">Discord</div>
    </div>
    <div class="card" onclick="location.href='https://www.reddit.com'">
      <div class="icon">⬡</div><div class="label">Reddit</div>
    </div>
  </div>

  <div class="chips">
    <a class="chip" onclick="location.href='https://www.wikipedia.org'">Wikipedia</a>
    <a class="chip" onclick="location.href='https://twitter.com'">Twitter</a>
    <a class="chip" onclick="location.href='https://duckduckgo.com'">DuckDuckGo</a>
    <a class="chip" onclick="location.href='https://yandex.ru'">Yandex</a>
  </div>
</div>

<div class="footer">
  <span><kbd>Ctrl+T</kbd> Новая вкладка</span>
  <span><kbd>Ctrl+W</kbd> Закрыть</span>
  <span><kbd>Ctrl+L</kbd> Адрес</span>
  <span><kbd>Ctrl+Shift+H</kbd> Stealth</span>
</div>

<script>
function tick(){
  var d=new Date();
  document.getElementById('clk').textContent=
    d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
tick();setInterval(tick,1000);

(function(){
  var c=document.getElementById('p'),n=20;
  for(var i=0;i<n;i++){
    var el=document.createElement('div');
    el.className='particle';
    var s=Math.random()*5+2;
    el.style.width=s+'px';el.style.height=s+'px';
    el.style.left=Math.random()*100+'%';
    el.style.animationDuration=(Math.random()*20+14)+'s';
    el.style.animationDelay=(Math.random()*15)+'s';
    c.appendChild(el);
  }
})();
</script>
</body>
</html>
