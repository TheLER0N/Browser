<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030508;--bg-surface:#131820;--bg-elevated:#1a2030;
  --accent:#7c5cfc;--accent-soft:#9b80fc;--cyan:#00d4aa;
  --text:#eaeef6;--text-secondary:#8a93a6;--text-muted:#525b6e;
  --border:#1c2233;--border-strong:#353d54;
  --danger:#ef4444;--success:#2dd4a0;
  --radius:16px;--radius-sm:12px;--radius-xs:8px;
}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:'Segoe UI Variable','Segoe UI',system-ui,-apple-system,sans-serif;
  min-height:100vh;overflow-x:hidden;position:relative;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}

/* ── Ambient Background ── */
.ambient{
  position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
}
.ambient::before,.ambient::after{
  content:'';position:absolute;border-radius:50%;filter:blur(120px);opacity:.12;
}
.ambient::before{
  width:600px;height:600px;top:-15%;left:-10%;
  background:radial-gradient(circle,var(--accent),transparent 70%);
  animation:drift1 12s ease-in-out infinite alternate;
}
.ambient::after{
  width:500px;height:500px;bottom:-10%;right:-8%;
  background:radial-gradient(circle,var(--cyan),transparent 70%);
  animation:drift2 14s ease-in-out infinite alternate;
}
@keyframes drift1{0%{transform:translate(0,0) scale(1)}100%{transform:translate(60px,40px) scale(1.1)}}
@keyframes drift2{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-50px,-30px) scale(1.08)}}

/* ── Particles ── */
.particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.particle{
  position:absolute;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--cyan));
  opacity:0;animation:rise linear infinite;
}
@keyframes rise{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  8%{opacity:.18}
  92%{opacity:.18}
  100%{transform:translateY(-8vh) scale(1);opacity:0}
}

/* ── Clock ── */
.clock{
  position:fixed;top:28px;right:36px;z-index:10;
  font-size:26px;font-weight:300;color:var(--text-secondary);
  font-family:'Consolas','Cascadia Code','SF Mono',monospace;
  letter-spacing:.5px;
  text-shadow:0 0 24px rgba(124,92,252,.2);
}

/* ── Main Layout ── */
.main{
  position:relative;z-index:5;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100vh;padding:60px 24px 40px;
}

/* ── Logo ── */
.logo-wrap{position:relative;margin-bottom:20px}
.logo{
  font-size:72px;
  animation:float 4s ease-in-out infinite;
  filter:drop-shadow(0 0 32px rgba(124,92,252,.35));
}
@keyframes float{
  0%,100%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-10px) rotate(1deg)}
}
.ring{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:110px;height:110px;border-radius:50%;
  border:1.5px solid rgba(124,92,252,.25);
  animation:ring 3s ease-in-out infinite;
}
@keyframes ring{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.4}
  50%{transform:translate(-50%,-50%) scale(1.12);opacity:.15}
}

/* ── Typography ── */
h1{
  font-size:46px;font-weight:700;margin-bottom:8px;letter-spacing:-.5px;
  background:linear-gradient(135deg,var(--accent-soft),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:glow 4s ease-in-out infinite alternate;
}
@keyframes glow{
  0%{filter:drop-shadow(0 0 8px rgba(124,92,252,.25))}
  100%{filter:drop-shadow(0 0 20px rgba(0,212,170,.3))}
}
.subtitle{
  color:var(--text-secondary);font-size:16px;margin-bottom:12px;
  font-weight:400;letter-spacing:.2px;
}

/* ── Stealth Badge ── */
.stealth{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(82,91,110,.15);border:1px solid rgba(82,91,110,.25);
  border-radius:20px;padding:5px 14px;margin-bottom:44px;
  font-size:11px;color:var(--text-muted);font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.dot{
  width:7px;height:7px;border-radius:50%;background:var(--text-muted);
  animation:blink 2.5s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Search Bar ── */
.search{
  width:100%;max-width:560px;margin-bottom:48px;position:relative;
}
.search input{
  width:100%;padding:15px 52px 15px 22px;
  background:var(--bg-surface);border:1px solid var(--border);
  border-radius:24px;color:var(--text);font-size:14.5px;
  outline:none;transition:all .25s ease;
  font-family:inherit;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.search input::placeholder{color:var(--text-muted);font-style:italic}
.search input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(124,92,252,.12),0 8px 32px rgba(0,0,0,.3);
}
.search input:hover:not(:focus){border-color:var(--border-strong)}
.search .ico{
  position:absolute;right:18px;top:50%;transform:translateY(-50%);
  font-size:18px;opacity:.4;pointer-events:none;
}

/* ── Quick Links Grid ── */
.grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
  max-width:620px;width:100%;margin-bottom:40px;
}
.card{
  background:rgba(19,24,32,.7);border:1px solid var(--border);
  border-radius:var(--radius);padding:22px 14px;text-align:center;
  cursor:pointer;position:relative;overflow:hidden;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,92,252,.08),rgba(0,212,170,.06));
  opacity:0;transition:opacity .3s ease;
}
.card:hover::before{opacity:1}
.card:hover{
  transform:translateY(-5px);
  border-color:var(--accent);
  box-shadow:0 12px 40px rgba(124,92,252,.18),0 0 0 1px var(--accent);
}
.card:active{transform:translateY(-2px) scale(.98)}
.card .icon{
  font-size:32px;margin-bottom:10px;position:relative;z-index:1;
  transition:transform .3s ease;
}
.card:hover .icon{transform:scale(1.15) rotate(4deg)}
.card .label{
  font-size:12.5px;color:var(--text);font-weight:600;
  position:relative;z-index:1;
}

/* ── Chips ── */
.chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.chip{
  padding:9px 18px;background:rgba(19,24,32,.5);
  border:1px solid var(--border);border-radius:20px;
  color:var(--text-secondary);font-size:12.5px;cursor:pointer;
  transition:all .25s ease;text-decoration:none;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.chip:hover{
  background:rgba(124,92,252,.12);border-color:var(--accent);
  color:var(--text);transform:translateY(-2px);
}

/* ── Footer ── */
.footer{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  color:var(--text-muted);font-size:10.5px;letter-spacing:.3px;
  display:flex;gap:16px;align-items:center;
}
.footer kbd{
  background:var(--bg-elevated);border:1px solid var(--border);
  border-radius:5px;padding:2px 6px;font-size:9.5px;font-family:inherit;
}

/* ── Entrance Animations ── */
.main>*{animation:fadeUp .6s ease-out both}
.main>*:nth-child(1){animation-delay:.08s}
.main>*:nth-child(2){animation-delay:.16s}
.main>*:nth-child(3){animation-delay:.24s}
.main>*:nth-child(4){animation-delay:.32s}
.main>*:nth-child(5){animation-delay:.4s}
.main>*:nth-child(6){animation-delay:.48s}
.main>*:nth-child(7){animation-delay:.56s}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Responsive ── */
@media(max-width:700px){
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  h1{font-size:34px}.logo{font-size:56px}
  .clock{font-size:18px;top:16px;right:16px}
  .search{max-width:100%}
}
</style>
</head>
<body>

<div class="ambient"></div>
<div class="particles" id="p"></div>
<div class="clock" id="clk"></div>

<div class="main">
  <div class="logo-wrap">
    <div class="ring"></div>
    <div class="logo">👻</div>
  </div>

  <h1>GhostBrowser</h1>
  <p class="subtitle">Приватный браузер нового поколения</p>

  <div class="stealth" id="sb">
    <span class="dot"></span>
    <span id="st">Stealth OFF</span>
  </div>

  <div class="search">
    <input type="text" id="si" placeholder="Поиск или введите URL..."
           onkeydown="if(event.key==='Enter'){var v=this.value;if(v){location.href=v.startsWith('http')?v:'https://www.google.com/search?q='+encodeURIComponent(v)}}"/>
    <span class="ico">🔍</span>
  </div>

  <div class="grid">
    <div class="card" onclick="location.href='https://www.google.com'">
      <div class="icon">🔍</div><div class="label">Google</div>
    </div>
    <div class="card" onclick="location.href='https://www.youtube.com'">
      <div class="icon">▶️</div><div class="label">YouTube</div>
    </div>
    <div class="card" onclick="location.href='https://github.com'">
      <div class="icon">💻</div><div class="label">GitHub</div>
    </div>
    <div class="card" onclick="location.href='https://vk.com'">
      <div class="icon">📱</div><div class="label">VK</div>
    </div>
    <div class="card" onclick="location.href='https://web.telegram.org'">
      <div class="icon">✈️</div><div class="label">Telegram</div>
    </div>
    <div class="card" onclick="location.href='https://discord.com'">
      <div class="icon">💬</div><div class="label">Discord</div>
    </div>
    <div class="card" onclick="location.href='https://www.reddit.com'">
      <div class="icon">🤖</div><div class="label">Reddit</div>
    </div>
    <div class="card" onclick="location.href='https://mail.ru'">
      <div class="icon">📧</div><div class="label">Mail.ru</div>
    </div>
  </div>

  <div class="chips">
    <a class="chip" onclick="location.href='https://www.wikipedia.org'">📚 Wikipedia</a>
    <a class="chip" onclick="location.href='https://twitter.com'">🐦 Twitter</a>
    <a class="chip" onclick="location.href='https://duckduckgo.com'">🦆 DuckDuckGo</a>
    <a class="chip" onclick="location.href='https://yandex.ru'">🅰️ Yandex</a>
  </div>
</div>

<div class="footer">
  <span><kbd>Ctrl+T</kbd> Новая вкладка</span>
  <span><kbd>Ctrl+W</kbd> Закрыть</span>
  <span><kbd>Ctrl+L</kbd> Адрес</span>
  <span><kbd>Ctrl+Shift+H</kbd> Stealth</span>
</div>

<script>
function tick(){
  var d=new Date();
  document.getElementById('clk').textContent=
    d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
tick();setInterval(tick,1000);

(function(){
  var c=document.getElementById('p'),n=20;
  for(var i=0;i<n;i++){
    var el=document.createElement('div');
    el.className='particle';
    var s=Math.random()*5+2;
    el.style.width=s+'px';el.style.height=s+'px';
    el.style.left=Math.random()*100+'%';
    el.style.animationDuration=(Math.random()*18+12)+'s';
    el.style.animationDelay=(Math.random()*12)+'s';
    c.appendChild(el);
  }
})();
</script>
</body>
</html>
