<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KING — Новая вкладка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #1a1208;
      --bg-card: rgba(212, 160, 23, 0.06);
      --text-primary: #f5e6c8;
      --text-secondary: #c4a882;
      --accent: #d4a017;
      --accent-light: #f0c040;
      --accent-glow: rgba(212, 160, 23, 0.25);
      --border: rgba(212, 160, 23, 0.12);
      --board-light: #d4a574;
      --board-dark: #8b6914;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Шахматная доска на фоне */
    .chess-board-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.08;
      background-image:
        linear-gradient(45deg, var(--board-light) 25%, transparent 25%),
        linear-gradient(-45deg, var(--board-light) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--board-light) 75%),
        linear-gradient(-45deg, transparent 75%, var(--board-light) 75%);
      background-size: 60px 60px;
      background-position: 0 0, 0 30px, 30px -30px, -30px 0px;
      animation: board-drift 60s linear infinite;
    }

    @keyframes board-drift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    /* Фоновая сетка */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(212, 160, 23, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212, 160, 23, 0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
    }

    /* Орбы — размытые цветные сферы как на сайте */
    .bg-orbs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.2;
    }

    .orb-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(212, 160, 23, 0.3), transparent 70%);
      top: -10%; left: -5%;
      animation: orb-float-1 20s ease-in-out infinite;
    }

    .orb-2 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(107, 63, 160, 0.2), transparent 70%);
      top: 40%; right: -8%;
      animation: orb-float-2 25s ease-in-out infinite;
    }

    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(212, 160, 23, 0.15), transparent 70%);
      bottom: 5%; left: 15%;
      animation: orb-float-3 18s ease-in-out infinite;
    }

    @keyframes orb-float-1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(80px, 60px) scale(1.15); }
    }

    @keyframes orb-float-2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-60px, -40px) scale(0.9); }
    }

    @keyframes orb-float-3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(50px, -50px) scale(1.1); }
    }

    /* Частицы */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Виньетка */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.5) 100%);
    }

    /* Кастомный курсор (как на сайте KING) */
    .custom-cursor {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 10000;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, background 0.2s;
    }

    .custom-cursor-follower {
      width: 30px;
      height: 30px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: left 0.15s ease-out, top 0.15s ease-out, width 0.3s, height 0.3s, border-color 0.3s;
    }

    .custom-cursor.active,
    .custom-cursor-follower.active {
      width: 50px;
      height: 50px;
      background: rgba(212, 160, 23, 0.1);
      border-color: var(--accent-light);
    }

    /* Основной контент */
    .main {
      text-align: center;
      z-index: 1;
      position: relative;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Логотип — круглый король */
    .logo-wrap {
      position: relative;
      display: inline-block;
      width: 120px;
      height: 120px;
      margin-bottom: 1.5rem;
    }

    .logo {
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      background: radial-gradient(circle at 30% 30%, #f0c040 0%, #d4a017 50%, #8b6914 100%);
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(212, 160, 23, 0.5), 0 0 80px rgba(212, 160, 23, 0.2), inset 0 -4px 10px rgba(0,0,0,0.3);
      animation: float 3s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }

    .avatar-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      box-shadow: 0 0 15px rgba(212, 160, 23, 0.4);
      opacity: 0.5;
      animation: pulse-ring 2.5s ease-in-out infinite, float-ring-1 3s ease-in-out infinite;
    }

    .avatar-ring-2 {
      position: absolute;
      inset: -24px;
      border-radius: 50%;
      border: 1px solid rgba(212, 160, 23, 0.3);
      box-shadow: 0 0 20px rgba(212, 160, 23, 0.2);
      animation: pulse-ring 3.5s ease-in-out infinite reverse, float-ring-2 3s ease-in-out infinite;
    }

    @keyframes float-ring-1 {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.05) translateY(-8px); }
    }

    @keyframes float-ring-2 {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.03) translateY(-6px); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    /* Заголовок */
    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 900;
      letter-spacing: 8px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% auto;
      animation: shine 3s linear infinite;
      margin-bottom: 0.5rem;
    }

    @keyframes shine {
      to { background-position: 200% center; }
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 2.5rem;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* Часы */
    .clock {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 1.2rem;
      color: var(--text-secondary);
      font-family: 'Consolas', 'Courier New', monospace;
      z-index: 1;
      letter-spacing: 2px;
    }

    /* Приветствие */
    .greeting {
      font-size: 1.3rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .greeting span {
      color: var(--accent);
      font-weight: 600;
    }

    /* Поисковая строка */
    .search-box {
      display: flex;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 6px 6px 6px 20px;
      width: min(560px, 90vw);
      margin: 0 auto 2rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 30px var(--accent-glow);
    }

    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 1rem;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .search-box input::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
    }

    .search-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .search-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .search-btn svg {
      width: 18px;
      height: 18px;
      fill: #1a1208;
    }

    /* Быстрые ссылки */
    .links-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .quick-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      max-width: 650px;
      margin: 0 auto;
    }

    .quick-link {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 18px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      font-family: 'Segoe UI', system-ui, sans-serif;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
      position: relative;
      overflow: hidden;
    }

    .quick-link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(212, 160, 23, 0.1), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .quick-link:hover::before {
      opacity: 1;
    }

    .quick-link:hover {
      border-color: var(--accent);
      color: var(--text-primary);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }

    .quick-link .icon {
      font-size: 1.2rem;
      position: relative;
      z-index: 1;
    }

    .quick-link span:last-child {
      position: relative;
      z-index: 1;
    }

    /* Декоративные шахматные фигуры по бокам */
    .side-pieces {
      position: fixed;
      z-index: 0;
      pointer-events: none;
      font-size: 6rem;
      opacity: 0.04;
      color: var(--accent);
    }

    .side-piece-left {
      left: 30px;
      top: 50%;
      transform: translateY(-50%);
      animation: piece-float 8s ease-in-out infinite;
    }

    .side-piece-right {
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      animation: piece-float 8s ease-in-out infinite reverse;
    }

    @keyframes piece-float {
      0%, 100% { transform: translateY(-50%) rotate(-5deg); }
      50% { transform: translateY(-55%) rotate(5deg); }
    }

    /* Декоративная линия-разделитель */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 0 auto 2rem;
    }
  </style>
</head>
<body>

  <div class="chess-board-bg"></div>
  <div class="bg-grid"></div>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <canvas id="particles"></canvas>
  <div class="vignette"></div>

  <!-- Кастомный курсор -->
  <div class="custom-cursor" id="cursor"></div>
  <div class="custom-cursor-follower" id="cursor-follower"></div>

  <!-- Декоративные фигуры -->
  <div class="side-pieces side-piece-left">♜</div>
  <div class="side-pieces side-piece-right">♞</div>

  <div class="clock" id="clock"></div>

  <div class="main">
    <div class="logo-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar-ring-2"></div>
      <div class="logo">♚</div>
    </div>

    <h1>KING</h1>
    <p class="subtitle">Шахматный браузер нового поколения</p>

    <div class="divider"></div>

    <p class="greeting" id="greeting"></p>

    <!-- Поисковая строка -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Поиск в Google или введите URL..." autofocus>
      <button class="search-btn" onclick="doSearch()">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
    </div>

    <!-- Быстрые ссылки -->
    <p class="links-label">Быстрый доступ</p>
    <div class="quick-links">
      <a href="https://www.google.com" class="quick-link"><span class="icon">🔍</span><span>Google</span></a>
      <a href="https://www.youtube.com" class="quick-link"><span class="icon">▶️</span><span>YouTube</span></a>
      <a href="https://github.com" class="quick-link"><span class="icon">💻</span><span>GitHub</span></a>
      <a href="https://theler0n.github.io/Sait/" class="quick-link"><span class="icon">♚</span><span>KING Site</span></a>
      <a href="https://mail.google.com" class="quick-link"><span class="icon">📧</span><span>Gmail</span></a>
      <a href="https://translate.google.com" class="quick-link"><span class="icon">🌐</span><span>Translate</span></a>
    </div>
  </div>

  <script>
    // === Часы ===
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // === Приветствие ===
    (function() {
      const h = new Date().getHours();
      let greet = 'Добрый день';
      if (h < 6) greet = 'Доброй ночи';
      else if (h < 12) greet = 'Доброе утро';
      else if (h >= 18) greet = 'Добрый вечер';
      document.getElementById('greeting').innerHTML = greet + ', <span>Король</span> ♚';
    })();

    // === Поиск ===
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doSearch();
    });

    function doSearch() {
      const q = searchInput.value.trim();
      if (!q) return;
      if (q.includes('.') && !q.includes(' ')) {
        window.location.href = q.startsWith('http') ? q : 'https://' + q;
      } else {
        window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q);
      }
    }

    // === Частицы (Canvas) — как на сайте KING ===
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.speedY = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.4 + 0.1;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(212, 160, 23, ${this.opacity})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < 80; i++) particles.push(new Particle());

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });

      // Соединительные линии
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(212, 160, 23, ${0.08 * (1 - dist / 120)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animate);
    }
    animate();

    // === Кастомный курсор ===
    const cursor = document.getElementById('cursor');
    const follower = document.getElementById('cursor-follower');
    let mouseX = 0, mouseY = 0;
    let followerX = 0, followerY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursor.style.left = mouseX + 'px';
      cursor.style.top = mouseY + 'px';
    });

    // Плавное следование follower
    function animateFollower() {
      followerX += (mouseX - followerX) * 0.12;
      followerY += (mouseY - followerY) * 0.12;
      follower.style.left = followerX + 'px';
      follower.style.top = followerY + 'px';
      requestAnimationFrame(animateFollower);
    }
    animateFollower();

    // Эффект при наведении на интерактивные элементы
    const interactives = document.querySelectorAll('a, button, input');
    interactives.forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.classList.add('active');
        follower.classList.add('active');
      });
      el.addEventListener('mouseleave', () => {
        cursor.classList.remove('active');
        follower.classList.remove('active');
      });
    });
  </script>
</body>
</html>
