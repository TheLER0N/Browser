<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KING Browser — Новая вкладка</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1208;--bg-surface:#2d1f0e;--bg-elevated:#3d2b14;
  --gold:#d4a017;--gold-light:#f0c040;--gold-dark:#a07818;
  --text:#f5e6c8;--text-secondary:#c4a882;--text-muted:#8b7355;
  --border:#5a4228;--border-strong:#7d6642;
  --danger:#8b1a1a;--success:#2d5a1e;--purple:#6b3fa0;
  --radius:16px;--radius-sm:12px;--radius-xs:8px;
}
html{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:Georgia,'Playfair Display','Times New Roman',serif;
  height:100%;overflow-x:hidden;position:relative;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}

/* ── Ambient Background (Gold Glow) ── */
.ambient{
  position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
}
.ambient::before,.ambient::after{
  content:'';position:absolute;border-radius:50%;filter:blur(140px);opacity:.08;
}
.ambient::before{
  width:700px;height:700px;top:-20%;left:-15%;
  background:radial-gradient(circle,var(--gold),transparent 70%);
  animation:drift1 14s ease-in-out infinite alternate;
}
.ambient::after{
  width:600px;height:600px;bottom:-15%;right:-10%;
  background:radial-gradient(circle,var(--gold-dark),transparent 70%);
  animation:drift2 16s ease-in-out infinite alternate;
}
@keyframes drift1{0%{transform:translate(0,0) scale(1)}100%{transform:translate(70px,50px) scale(1.15)}}
@keyframes drift2{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-60px,-40px) scale(1.1)}}

/* ── Chess Board Pattern Overlay ── */
.chess-pattern{
  position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.02;
  background-image:
    linear-gradient(45deg,var(--gold) 25%,transparent 25%),
    linear-gradient(-45deg,var(--gold) 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,var(--gold) 75%),
    linear-gradient(-45deg,transparent 75%,var(--gold) 75%);
  background-size:60px 60px;
  background-position:0 0,0 30px,30px -30px,-30px 0;
}

/* ── Particles (Gold Dust) ── */
.particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.particle{
  position:absolute;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  opacity:0;animation:rise linear infinite;
}
@keyframes rise{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  8%{opacity:.25}
  92%{opacity:.25}
  100%{transform:translateY(-8vh) scale(1);opacity:0}
}

/* ── Clock ── */
.clock{
  position:fixed;top:28px;right:36px;z-index:10;
  font-size:24px;font-weight:400;color:var(--text-secondary);
  font-family:'Consolas','Cascadia Code',monospace;
  letter-spacing:.5px;
  text-shadow:0 0 24px rgba(212,160,23,.25);
}

/* ── Main Layout ── */
.main{
  position:relative;z-index:5;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;padding:60px 24px 40px;
  overflow-y:auto;
}

/* ── Crown Icon ── */
.crown-wrap{position:relative;margin-bottom:24px}
.crown{
  font-size:80px;
  animation:float 4.5s ease-in-out infinite;
  filter:drop-shadow(0 0 40px rgba(212,160,23,.4));
}
@keyframes float{
  0%,100%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-12px) rotate(2deg)}
}
.ring{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:130px;height:130px;border-radius:50%;
  border:2px solid rgba(212,160,23,.3);
  animation:ring 3.5s ease-in-out infinite;
}
.ring::before{
  content:'';position:absolute;inset:8px;border-radius:50%;
  border:1px solid rgba(212,160,23,.15);
  animation:ring 3.5s ease-in-out infinite reverse;
}
@keyframes ring{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5}
  50%{transform:translate(-50%,-50%) scale(1.15);opacity:.2}
}

/* ── Typography ── */
h1{
  font-size:52px;font-weight:700;margin-bottom:10px;letter-spacing:2px;
  background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--gold-dark));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  text-transform:uppercase;
  animation:glow 4s ease-in-out infinite alternate;
}
@keyframes glow{
  0%{filter:drop-shadow(0 0 12px rgba(212,160,23,.3))}
  100%{filter:drop-shadow(0 0 28px rgba(240,192,64,.4))}
}
.subtitle{
  color:var(--text-secondary);font-size:16px;margin-bottom:12px;
  font-weight:400;letter-spacing:1px;font-family:'Segoe UI',system-ui,sans-serif;
}

/* ── Stealth Badge ── */
.stealth{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(139,115,85,.12);border:1px solid rgba(139,115,85,.3);
  border-radius:24px;padding:6px 16px;margin-bottom:48px;
  font-size:11px;color:var(--text-muted);font-weight:600;
  text-transform:uppercase;letter-spacing:1px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  font-family:'Segoe UI',system-ui,sans-serif;
}
.dot{
  width:8px;height:8px;border-radius:50%;background:var(--text-muted);
  animation:blink 2.5s ease-in-out infinite;
}
.dot.active{background:var(--success);box-shadow:0 0 8px var(--success)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Search Bar ── */
.search{
  width:100%;max-width:600px;margin-bottom:52px;position:relative;
  font-family:'Segoe UI',system-ui,sans-serif;
}
.search input{
  width:100%;padding:16px 56px 16px 24px;
  background:var(--bg-surface);border:1px solid var(--border);
  border-radius:28px;color:var(--text);font-size:14.5px;
  outline:none;transition:all .3s ease;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
.search input::placeholder{color:var(--text-muted);font-style:italic}
.search input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(212,160,23,.15),0 10px 36px rgba(0,0,0,.35);
}
.search input:hover:not(:focus){border-color:var(--border-strong)}
.search .ico{
  position:absolute;right:20px;top:50%;transform:translateY(-50%);
  font-size:18px;opacity:.4;pointer-events:none;color:var(--text-muted);
}

/* ── Quick Links Grid ── */
.grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:18px;
  max-width:640px;width:100%;margin-bottom:44px;
}
.card{
  background:rgba(45,31,14,.65);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px 16px;text-align:center;
  cursor:pointer;position:relative;overflow:hidden;
  transition:all .35s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  font-family:'Segoe UI',system-ui,sans-serif;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(212,160,23,.1),rgba(240,192,64,.06));
  opacity:0;transition:opacity .35s ease;
}
.card:hover::before{opacity:1}
.card:hover{
  transform:translateY(-6px);
  border-color:var(--gold);
  box-shadow:0 14px 44px rgba(212,160,23,.2),0 0 0 1px var(--gold);
}
.card:active{transform:translateY(-3px) scale(.98)}
.card .icon{
  font-size:34px;margin-bottom:12px;position:relative;z-index:1;
  transition:transform .35s ease;
}
.card:hover .icon{transform:scale(1.18) rotate(5deg)}
.card .label{
  font-size:12.5px;color:var(--text);font-weight:600;
  position:relative;z-index:1;
}

/* ── Chips ── */
.chips{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.chip{
  padding:10px 20px;background:rgba(45,31,14,.5);
  border:1px solid var(--border);border-radius:24px;
  color:var(--text-secondary);font-size:12.5px;cursor:pointer;
  transition:all .3s ease;text-decoration:none;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  font-family:'Segoe UI',system-ui,sans-serif;
}
.chip:hover{
  background:rgba(212,160,23,.12);border-color:var(--gold);
  color:var(--text);transform:translateY(-3px);
  box-shadow:0 6px 20px rgba(212,160,23,.15);
}

/* ── Footer ── */
.footer{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  color:var(--text-muted);font-size:10.5px;letter-spacing:.4px;
  display:flex;gap:18px;align-items:center;
  font-family:'Segoe UI',system-ui,sans-serif;
}
.footer kbd{
  background:var(--bg-elevated);border:1px solid var(--border);
  border-radius:6px;padding:3px 7px;font-size:10px;font-family:inherit;
  color:var(--text-secondary);
}

/* ── Entrance Animations ── */
.main>*{animation:fadeUp .7s ease-out both}
.main>*:nth-child(1){animation-delay:.1s}
.main>*:nth-child(2){animation-delay:.2s}
.main>*:nth-child(3){animation-delay:.3s}
.main>*:nth-child(4){animation-delay:.4s}
.main>*:nth-child(5){animation-delay:.5s}
.main>*:nth-child(6){animation-delay:.6s}
.main>*:nth-child(7){animation-delay:.7s}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(28px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Responsive ── */
@media(max-width:700px){
  .grid{grid-template-columns:repeat(2,1fr);gap:12px}
  h1{font-size:38px;letter-spacing:1px}
  .crown{font-size:60px}
  .clock{font-size:18px;top:16px;right:16px}
  .search{max-width:100%}
  .footer{gap:10px;font-size:9.5px}
}
</style>
</head>
<body>

<div class="ambient"></div>
<div class="chess-pattern"></div>
<div class="particles" id="p"></div>
<div class="clock" id="clk"></div>

<div class="main">
  <div class="crown-wrap">
    <div class="ring"></div>
    <div class="crown">♚</div>
  </div>

  <h1>KING</h1>
  <p class="subtitle">Королевский браузер с защитой</p>

  <div class="stealth" id="sb">
    <span class="dot" id="sd"></span>
    <span id="st">Stealth OFF</span>
  </div>

  <div class="search">
    <input type="text" id="si" placeholder="Поиск или введите URL..."
           onkeydown="if(event.key==='Enter'){var v=this.value;if(v){location.href=v.startsWith('http')?v:'https://www.google.com/search?q='+encodeURIComponent(v)}}"/>
    <span class="ico">🔍</span>
  </div>

  <div class="grid">
    <div class="card" onclick="location.href='https://www.google.com'">
      <div class="icon">🔍</div><div class="label">Google</div>
    </div>
    <div class="card" onclick="location.href='https://www.youtube.com'">
      <div class="icon">▶️</div><div class="label">YouTube</div>
    </div>
    <div class="card" onclick="location.href='https://github.com'">
      <div class="icon">💻</div><div class="label">GitHub</div>
    </div>
    <div class="card" onclick="location.href='https://vk.com'">
      <div class="icon">📱</div><div class="label">VK</div>
    </div>
    <div class="card" onclick="location.href='https://web.telegram.org'">
      <div class="icon">✈️</div><div class="label">Telegram</div>
    </div>
    <div class="card" onclick="location.href='https://discord.com'">
      <div class="icon">💬</div><div class="label">Discord</div>
    </div>
    <div class="card" onclick="location.href='https://www.reddit.com'">
      <div class="icon">🤖</div><div class="label">Reddit</div>
    </div>
    <div class="card" onclick="location.href='https://mail.ru'">
      <div class="icon">📧</div><div class="label">Mail.ru</div>
    </div>
  </div>

  <div class="chips">
    <a class="chip" onclick="location.href='https://www.wikipedia.org'">📚 Wikipedia</a>
    <a class="chip" onclick="location.href='https://twitter.com'">🐦 Twitter</a>
    <a class="chip" onclick="location.href='https://duckduckgo.com'">🦆 DuckDuckGo</a>
    <a class="chip" onclick="location.href='https://yandex.ru'">🅰️ Yandex</a>
  </div>
</div>

<div class="footer">
  <span><kbd>Ctrl+T</kbd> Новая вкладка</span>
  <span><kbd>Ctrl+W</kbd> Закрыть</span>
  <span><kbd>Ctrl+L</kbd> Адрес</span>
  <span><kbd>Ctrl+Shift+H</kbd> Stealth</span>
</div>

<script>
function tick(){
  var d=new Date();
  document.getElementById('clk').textContent=
    d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
tick();setInterval(tick,1000);

(function(){
  var c=document.getElementById('p'),n=25;
  for(var i=0;i<n;i++){
    var el=document.createElement('div');
    el.className='particle';
    var s=Math.random()*6+2;
    el.style.width=s+'px';el.style.height=s+'px';
    el.style.left=Math.random()*100+'%';
    el.style.animationDuration=(Math.random()*20+14)+'s';
    el.style.animationDelay=(Math.random()*15)+'s';
    c.appendChild(el);
  }
})();
</script>
</body>
</html>
